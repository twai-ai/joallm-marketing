# Prefer the repo-root Dockerfile.backend deploy (Root Directory blank).
# If you keep Root Directory = joallm-platform/services/backend, use this file
# and set Dockerfile path to "Dockerfile" only (not the nested path again).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Marketing uses BullMQ workers, not Celery. Clear any dashboard Start Command
# that still says `celery ...` — it overrides this and will crash deploy.
startCommand = "./railway-start.sh"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[mounts]]
path = "/app/data"
name = "uploads-volume"
