version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: joallm-postgres
    environment:
      POSTGRES_DB: joallm
      POSTGRES_USER: joallm
      POSTGRES_PASSWORD: joallm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/backend/create-models-table.sql:/docker-entrypoint-initdb.d/01-create-models.sql
    networks:
      - joallm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joallm -d joallm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and event bus
  redis:
    image: redis:7-alpine
    container_name: joallm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - joallm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: joallm-api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_GATEWAY_PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - CHAT_SERVICE_URL=http://chat-service:3002
      - RAG_SERVICE_URL=http://rag-service:3003
      - FILE_SERVICE_URL=http://file-service:3004
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:5173,http://localhost:3000
      - SERVICE_API_KEY=your-service-api-key
    depends_on:
      - redis
    networks:
      - joallm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Auth Service
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: joallm-auth-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - AUTH_SERVICE_PORT=3001
      - DATABASE_URL=postgresql://joallm:joallm_password@postgres:5432/joallm_auth
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=15m
      - REFRESH_TOKEN_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:5173,http://localhost:3000
      - SERVICE_API_KEY=your-service-api-key
      - EVENT_BUS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - joallm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Chat Service
  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    container_name: joallm-chat-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - CHAT_SERVICE_PORT=3002
      - DATABASE_URL=postgresql://joallm:joallm_password@postgres:5432/joallm_chat
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3001
      - CORS_ORIGIN=http://localhost:5173,http://localhost:3000
      - SERVICE_API_KEY=your-service-api-key
      - EVENT_BUS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - joallm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # RAG Service (placeholder for future implementation)
  rag-service:
    image: nginx:alpine
    container_name: joallm-rag-service
    ports:
      - "3003:80"
    volumes:
      - ./services/rag-service/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - joallm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # File Service (placeholder for future implementation)
  file-service:
    image: nginx:alpine
    container_name: joallm-file-service
    ports:
      - "3004:80"
    volumes:
      - ./services/file-service/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - joallm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: joallm-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_WS_URL=ws://localhost:3000
    depends_on:
      - api-gateway
    networks:
      - joallm-network

  # Landing Page
  landing-page:
    build:
      context: ./services/landing-page
      dockerfile: Dockerfile
    container_name: joallm-landing-page
    ports:
      - "3005:3005"
    networks:
      - joallm-network

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: joallm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - joallm-network

  grafana:
    image: grafana/grafana:latest
    container_name: joallm-grafana
    ports:
      - "3030:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - joallm-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: joallm-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - joallm-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: joallm-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - joallm-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: joallm-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://joallm:joallm_password@postgres:5432/joallm?sslmode=disable
    depends_on:
      - postgres
    networks:
      - joallm-network

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: joallm-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis
    networks:
      - joallm-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  joallm-network:
    driver: bridge
