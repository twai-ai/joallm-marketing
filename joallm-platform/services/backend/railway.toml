# Used when Railway Root Directory = joallm-platform/services/backend
# Do NOT set Dockerfile path to joallm-platform/services/backend/Dockerfile in that case.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[mounts]]
path = "/app/data"
name = "uploads-volume"
